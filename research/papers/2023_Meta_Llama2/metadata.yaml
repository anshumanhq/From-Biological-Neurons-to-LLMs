knowledge_flow: |
  Llama 2 (2023) significantly extended the LLaMA family by releasing models
  with up to 70B parameters, including both base models and chat‑fine‑tuned
  versions (Llama 2‑Chat). The paper introduced a comprehensive RLHF pipeline
  with safety‑specific reward models and explored the trade‑offs between
  helpfulness and safety. The models were released under a more permissive
  licence than the original LLaMA, enabling wider commercial use. Llama 2
  established a new standard for open‑weight foundation models and catalysed
  the development of numerous derivative models.
