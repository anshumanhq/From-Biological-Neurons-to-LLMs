knowledge_flow: |
  BERT (2018) introduced deep bidirectional representation learning through
  two unsupervised pre-training objectives: Masked Language Modeling (MLM)
  and Next Sentence Prediction (NSP). Unlike GPT's autoregressive approach,
  BERT uses the Transformer encoder to condition on both left and right
  contexts, enabling rich bidirectional representations. The model achieved
  state-of-the-art results on 11 NLP tasks, including GLUE and SQuAD,
  establishing the "pre-train then fine-tune" paradigm as the dominant
  approach for NLP. BERT became one of the most influential papers in NLP
  history, sparking a wave of follow-up models (RoBERTa, ALBERT, DeBERTa,
  etc.) and setting the stage for the modern foundation model era.
