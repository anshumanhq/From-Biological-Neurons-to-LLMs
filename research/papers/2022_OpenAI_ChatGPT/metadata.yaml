knowledge_flow: |
  ChatGPT (2022) was released as a conversational interface built on top
  of InstructGPT-style aligned language models (GPT-3.5). It did not
  introduce a new RLHF algorithm or neural architecture. Its historical
  importance lies in making aligned LLMs accessible through a simple
  conversational interface, rapidly achieving 100 million users within
  two months and sparking mainstream adoption of generative AI.
