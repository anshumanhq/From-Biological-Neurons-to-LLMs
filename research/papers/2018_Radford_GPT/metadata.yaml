knowledge_flow: |
  GPT (2018) introduced generative pre-training of a Transformer decoder
  on a large text corpus (BooksCorpus), followed by supervised fine-tuning
  on downstream tasks. This established the "pre-train then fine-tune"
  paradigm that became the foundation for modern LLMs. The model uses
  a 12-layer Transformer decoder with masked self-attention (causal masking)
  to perform autoregressive language modelling.
