knowledge_flow: |
  Mixtral 8×7B (2024) introduced a sparse Mixture of Experts (MoE)
  architecture, extending the efficiency philosophy of Mistral 7B.
  The model has 8 expert networks, each with approximately 7 billion
  parameters, resulting in a total parameter count of ~47B. However,
  it uses only a sparse subset of experts (top‑2 routing) per token,
  resulting in ~13B active parameters during inference. This maintains
  inference efficiency close to a dense 7B model while providing the
  capacity of a much larger model. Mixtral demonstrated strong performance,
  outperforming Llama 2 70B and GPT‑3.5 on several benchmarks. The
  open‑weight release further solidified Mistral AI's position in the
  open‑weight ecosystem.
