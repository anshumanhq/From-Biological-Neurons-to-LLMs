knowledge_flow: |
  GPT-2 (2019) demonstrated that scaling a Transformer language model
  to 1.5 billion parameters and training on a large, diverse web corpus
  (WebText, 40GB) could produce strong zero-shot task performance without
  task-specific fine-tuning. The model family included four sizes:
  Small (117M), Medium (345M), Large (774M), and XL (1.5B). The paper
  also introduced byte-level BPE tokenization and established language
  modelling as a general-purpose learning framework.
