knowledge_flow: |
  ResNet (2015) introduced residual learning with identity shortcut connections
  to address the degradation problem in very deep networks. The formulation
  H(x) = F(x) + x allows gradients to flow directly through the network,
  enabling training of networks with 152 layers and winning the ILSVRC 2015
  competition with 3.57% top‑5 error. Residual connections have since become
  a fundamental component of many architectures, including Transformers.
