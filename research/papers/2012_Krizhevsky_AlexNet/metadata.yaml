knowledge_flow: |
  AlexNet (2012) demonstrated that deep CNNs with ReLU activations, dropout,
  data augmentation, and GPU training could achieve breakthrough performance
  on the ImageNet Large-Scale Visual Recognition Challenge (ILSVRC). This
  paper marked the beginning of the modern deep-learning era and sparked
  the AI boom of the 2010s.
