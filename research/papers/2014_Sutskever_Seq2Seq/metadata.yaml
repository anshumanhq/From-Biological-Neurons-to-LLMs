knowledge_flow: |
  Seq2Seq (2014) introduced the encoder-decoder architecture for sequence
  transduction tasks like neural machine translation. It used two LSTMs:
  one to encode the source sequence into a fixed-length vector, and another
  to decode that vector into the target sequence. This paper established
  the foundation for all subsequent sequence-to-sequence models, including
  attention-based models and Transformers.
