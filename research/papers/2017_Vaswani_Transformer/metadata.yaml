knowledge_flow: |
  The Transformer (2017) introduced a sequence transduction architecture
  based solely on attention mechanisms, eliminating recurrence and convolution.
  The scaled dot-product attention (softmax(QK^T/√d_k)V) and multi-head
  attention allow parallel processing of sequences, enabling efficient training
  and state-of-the-art results on machine translation. This architecture
  became the foundation for all modern large language models.
