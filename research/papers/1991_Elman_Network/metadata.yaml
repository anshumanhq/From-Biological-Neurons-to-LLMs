knowledge_flow: |
  Elman Network (1991) simplified the Jordan Network by using the hidden state
  as context (rather than output). This became the standard "Simple RNN" and
  demonstrated that hidden-state recurrence can capture richer temporal patterns.
  However, it still suffered from vanishing gradients, motivating LSTM.
