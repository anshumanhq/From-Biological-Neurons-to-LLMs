knowledge_flow: |
  GPT-3 (2020) scaled the autoregressive Transformer language model
  to 175 billion parameters, demonstrating that scaling substantially
  improves in-context learning, particularly in the few-shot setting.
  The model was evaluated in zero-shot, one-shot, and few-shot settings
  without gradient updates or task-specific fine-tuning. The paper
  established scaling as the central experimental variable, documented
  performance improvements with model scale, and reported both successes
  and limitations including benchmark contamination concerns.
