knowledge_flow: |
  LLaMA (2023) demonstrated that highly capable foundation language models
  could be trained at comparatively smaller parameter scales using large
  quantities of publicly available data and careful training methodology.
  The paper introduced models ranging from 7B to 65B parameters and reported
  that LLaMA-13B outperformed GPT-3 (175B) on most evaluated benchmarks,
  while LLaMA-65B was competitive with larger contemporary models.
  The original release provided research access to model weights under a
  noncommercial license. Although not an unrestricted open-source release,
  LLaMA became a major catalyst for the subsequent open-weight LLM ecosystem,
  including instruction-tuned, quantized, and derivative models.
