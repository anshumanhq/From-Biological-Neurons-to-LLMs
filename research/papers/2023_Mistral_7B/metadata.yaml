knowledge_flow: |
  Mistral 7B (2023) introduced a 7B-parameter efficient language model
  with two key architectural innovations: Grouped-Query Attention (GQA)
  and Sliding Window Attention (SWA). GQA reduces memory bandwidth
  requirements during inference, while SWA limits attention computation
  to local windows, enabling faster processing of long sequences. The
  model demonstrated strong performance on various benchmarks, often
  outperforming much larger models in specific evaluations. Released
  under an open-weight licence, Mistral 7B significantly influenced
  the open-weight LLM ecosystem and established efficiency as a key
  design goal.
