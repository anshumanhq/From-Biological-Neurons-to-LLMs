knowledge_flow: |
  InstructGPT (2022) demonstrated that fine-tuning a pretrained language
  model with Reinforcement Learning from Human Feedback (RLHF) could
  significantly improve instruction following and alignment with human
  preferences. The pipeline involved supervised fine-tuning on human-
  written demonstrations, reward model training on human preference
  rankings, and PPO-based RLHF optimization. The paper showed that a
  1.3B parameter InstructGPT model was preferred by human evaluators
  over the 175B GPT-3 base model on the evaluated prompt distribution.
  The work established RLHF as the standard method for aligning large
  language models with human values and instructions.
