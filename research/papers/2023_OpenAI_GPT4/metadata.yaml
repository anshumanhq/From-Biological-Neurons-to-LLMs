knowledge_flow: |
  GPT-4 (2023) represented a major leap in large language model capability,
  reasoning, and reliability. While the core architecture remained a
  Transformer decoder, it incorporated extensive post-training alignment,
  improved scaling, and (in later deployments) multimodal input capability.
  The technical report documented performance on a wide range of benchmarks,
  including human-level performance on many professional and academic exams,
  and highlighted safety improvements through RLHF and adversarial testing.
  GPT-4 set a new standard for practical LLM capability and safety.
