knowledge_flow: |
  GPT-4 (2023) represented a major leap in large language model capability,
  reasoning, and reliability. While the exact architecture and parameter count
  were not disclosed, it belongs to the autoregressive Transformer-based family
  with extensive post-training alignment (RLHF-style). The technical report
  documented strong performance across academic and professional evaluations,
  including human-level or near-human-level performance on several reported
  exams and benchmarks, and highlighted improvements in safety and reliability.
  The initial public release was text-only, with multimodal image-input
  capability made available later through selected deployments.
