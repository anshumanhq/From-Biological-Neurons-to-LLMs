knowledge_flow: |
  LSTM (1997) introduces a gated memory cell that enables the network to store and
  retrieve information over long intervals, effectively addressing the vanishing-gradient
  problem that plagued earlier RNNs. The Constant Error Carousel (CEC) allows error
  to flow unchanged through time, while the input, forget, and output gates control
  access to the memory. This architecture became the foundation for sequence modelling
  for nearly two decades before Transformers.
