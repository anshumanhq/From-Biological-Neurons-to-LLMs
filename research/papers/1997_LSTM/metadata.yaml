knowledge_flow: |
  The original 1997 LSTM introduced a memory cell with a Constant Error Carousel (CEC)
  and input/output gating, enabling more reliable learning of long-term dependencies.
  The later forget-gate extension (1999/2000) made the memory capable of adaptive
  resetting in continuous input streams.
