knowledge_flow: |
  GANs (2014) introduced adversarial training as a general framework
  for learning generative models through competition between a generator
  and discriminator. The minimax objective (min_G max_D V(D,G)) connects
  the training dynamics to Jensen-Shannon divergence minimization. This
  paper established a new paradigm for generative modelling that has
  since been extended to image, text, and audio generation.
